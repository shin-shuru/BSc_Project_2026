model:
  type: siren
  in_features: 3
  hidden_features: 128
  hidden_layers: 3
  out_features: 1
  first_w0: 15.0
  hidden_w0: 10.0

meta:
  seed: 2024
  split: train
  alpha: 0.0005 ### inner loop training  lr
  beta: 0.00005 ### outer loop (meta) training lr;   beta < alpha
  k_support: 4096 ### points used for inner adaptation 
  k_query: 4096 ### points used for computing meta-loss
  num_metatasks: 16 ### number of liver tasks per meta-iteration (suggested: low (1-2), high (4-16))
  inner_steps: 2 # number of gradient steps per task (1-3 is ideal)
  first_order: false ### false: computes second derivatives (slower + accurate)
  iterations: 10000 ### number of meta-training steps
  print_every: 50
  balanced_sampling: true ### balances occupancy values (0 & 1) for equal sampling (??? 이따 false해봄)

output:
  run_name: meta_siren